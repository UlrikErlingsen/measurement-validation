<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">MeasureSignal</title>
  <desc id="desc">Explore whether a proposed multi-item score has a defensible measurement structure.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1"><stop stop-color="#173C3A"/><stop offset="1" stop-color="#102C2A"/></linearGradient>
    <radialGradient id="glow"><stop stop-color="#83D2B4" stop-opacity=".18"/><stop offset="1" stop-color="#83D2B4" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="360" rx="36" fill="url(#bg)"/>
  <circle cx="1050" cy="180" r="260" fill="url(#glow)"/>
  <circle cx="92" cy="385" r="155" fill="#F2C66D" opacity=".07"/>

  <g transform="translate(72 70)">
    <rect width="118" height="118" rx="30" fill="#102C2A" stroke="#83D2B4" stroke-width="3"/>
    <g fill="none" stroke="#83D2B4" stroke-width="2.5" opacity=".68">
      <path d="M31 31l28 13 28-13M31 59h56M31 87l28-13 28 13"/>
      <path d="M31 31v56M59 44v30M87 31v56"/>
    </g>
    <g fill="#F8F5ED">
      <circle cx="31" cy="31" r="6"/><circle cx="59" cy="44" r="6"/><circle cx="87" cy="31" r="6"/>
      <circle cx="31" cy="59" r="6" fill="#83D2B4"/><circle cx="59" cy="59" r="6" fill="#F2C66D"/><circle cx="87" cy="59" r="6" fill="#D95B40"/>
      <circle cx="31" cy="87" r="6"/><circle cx="59" cy="74" r="6"/><circle cx="87" cy="87" r="6"/>
    </g>
  </g>

  <text x="222" y="136" fill="#F8F5ED" font-family="Inter,Arial,sans-serif" font-size="68" font-weight="800" letter-spacing="-3">Measure<tspan fill="#F2C66D">Signal</tspan></text>
  <text x="226" y="192" fill="#D7E3DF" font-family="Inter,Arial,sans-serif" font-size="25">Is this score measuring what you think it is?</text>
  <g font-family="Inter,Arial,sans-serif" font-size="16" font-weight="700">
    <rect x="226" y="233" width="204" height="42" rx="21" fill="#ffffff" opacity=".08"/><text x="251" y="260" fill="#F8F5ED">PARALLEL ANALYSIS</text>
    <rect x="444" y="233" width="206" height="42" rx="21" fill="#ffffff" opacity=".08"/><text x="469" y="260" fill="#F8F5ED">COMMON FACTORS</text>
    <rect x="664" y="233" width="186" height="42" rx="21" fill="#ffffff" opacity=".08"/><text x="689" y="260" fill="#F8F5ED">ALPHA + OMEGA</text>
  </g>

  <g transform="translate(927 74)" fill="none" stroke-linecap="round">
    <path d="M0 51C45 0 102 0 147 51S249 102 294 51" stroke="#83D2B4" stroke-width="3" opacity=".33"/>
    <path d="M0 105c45-51 102-51 147 0s102 51 147 0" stroke="#F2C66D" stroke-width="3" opacity=".28"/>
    <path d="M0 159c45-51 102-51 147 0s102 51 147 0" stroke="#D95B40" stroke-width="3" opacity=".25"/>
    <g fill="#F8F5ED" stroke="none" opacity=".62">
      <circle cx="25" cy="31" r="5"/><circle cx="78" cy="19" r="5"/><circle cx="130" cy="40" r="5"/>
      <circle cx="25" cy="91" r="5"/><circle cx="78" cy="76" r="5"/><circle cx="130" cy="96" r="5"/>
      <circle cx="25" cy="151" r="5"/><circle cx="78" cy="137" r="5"/><circle cx="130" cy="157" r="5"/>
    </g>
  </g>
</svg>
